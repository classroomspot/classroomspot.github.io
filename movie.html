<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>classroomspot web</title>

<!-- !! PATHS MATCH YOUR REPO ROOT - all uv files are at / not /uv/ !! -->
<script src="/uv.bundle.js"></script>
<script src="/uv.config.js"></script>
<script src="/worker.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Rajdhani', sans-serif; }
body { background: url('https://cdn.wallpapersafari.com/41/51/UWuyKN.jpg') center/cover no-repeat fixed; }
body::before { content: ''; position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 0; }

.snow-container { position: fixed; inset: 0; pointer-events: none; z-index: 1; overflow: hidden; }
.particle { position: absolute; background: #fff; border-radius: 50%; animation: fall linear infinite; }
@keyframes fall {
    0%   { transform: translateY(-20px) translateX(0); opacity: 1; }
    50%  { transform: translateY(50vh) translateX(-10px); opacity: 0.7; }
    100% { transform: translateY(105vh) translateX(5px); opacity: 0; }
}

.browser-ui {
    position: relative; z-index: 10; height: 96px;
    background: rgba(0,0,0,0.88); backdrop-filter: blur(20px);
    display: flex; flex-direction: column;
    border-bottom: 1px solid rgba(255,255,255,0.2);
}
.tabs {
    height: 38px; display: flex; align-items: flex-end;
    padding: 0 8px; gap: 4px; overflow-x: auto; scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
    height: 28px; min-width: 150px; max-width: 220px; padding: 0 12px;
    border-radius: 8px 8px 0 0; background: rgba(25,25,25,0.9); color: #888;
    display: flex; align-items: center; gap: 8px; cursor: pointer;
    border: 1px solid rgba(255,255,255,0.08); border-bottom: none;
    font-family: 'Orbitron', sans-serif; font-size: 11px;
    user-select: none; flex-shrink: 0; transition: all 0.2s;
}
.tab.active {
    background: rgba(45,45,45,0.98); color: #fff;
    border-color: rgba(255,255,255,0.4);
    box-shadow: 0 0 18px rgba(255,255,255,0.15);
    text-shadow: 0 0 10px rgba(255,255,255,0.7);
}
.tab span { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.close-btn { opacity: 0.4; transition: all 0.2s; font-size: 10px; flex-shrink: 0; }
.tab:hover .close-btn { opacity: 0.7; }
.close-btn:hover { opacity: 1 !important; color: #ff5555 !important; }

.newtab-btn {
    width: 28px; height: 28px; border-radius: 6px 6px 0 0;
    border: 1px solid rgba(255,255,255,0.1); border-bottom: none;
    background: transparent; color: #aaa; cursor: pointer; font-size: 13px;
    align-self: flex-end; flex-shrink: 0; transition: all 0.2s;
}
.newtab-btn:hover { background: rgba(255,255,255,0.12); color: #fff; }

.navbar { height: 58px; display: flex; align-items: center; gap: 8px; padding: 0 14px; }
.nav-btn {
    width: 34px; height: 34px; border-radius: 50%; border: none;
    background: transparent; color: #ccc; cursor: pointer; font-size: 14px;
    flex-shrink: 0; transition: all 0.2s;
}
.nav-btn:hover { background: rgba(255,255,255,0.15); color: #fff; box-shadow: 0 0 14px rgba(255,255,255,0.3); }
.nav-btn:disabled { opacity: 0.3; cursor: default; }
.nav-btn:disabled:hover { background: transparent; box-shadow: none; }

.urlbar {
    flex: 1; height: 36px; background: rgba(8,8,8,0.92); border-radius: 18px;
    padding: 0 14px 0 10px; display: flex; align-items: center; gap: 6px;
    border: 1px solid rgba(255,255,255,0.22); transition: all 0.3s;
}
.urlbar:focus-within { border-color: rgba(255,255,255,0.55); box-shadow: 0 0 18px rgba(255,255,255,0.18); }
.engine-select {
    background: transparent; border: none; color: #aaa;
    font-family: 'Rajdhani', sans-serif; font-size: 12px; cursor: pointer; outline: none; flex-shrink: 0;
}
.engine-select option { background: #111; color: #fff; }
.url-input {
    flex: 1; background: transparent; border: none; outline: none;
    color: #fff; font-size: 13px; font-family: 'Rajdhani', sans-serif; min-width: 0;
}
.url-input::placeholder { color: rgba(255,255,255,0.4); }

.viewframe {
    position: absolute; top: 96px; left: 0;
    width: 100%; height: calc(100% - 96px);
    border: none; display: none; z-index: 5;
}
.viewframe.active { display: block; }

.loader {
    position: fixed; inset: 0; background: rgba(0,0,0,0.92);
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; z-index: 9999; backdrop-filter: blur(12px);
    gap: 18px; transition: opacity 0.4s;
}
.loader.hidden { opacity: 0; pointer-events: none; }
.loader img { width: 160px; height: 160px; border-radius: 18px; box-shadow: 0 0 40px rgba(255,255,255,0.35); }
.loader-text {
    font-family: 'Orbitron', sans-serif; font-size: 1.5rem; color: #fff;
    letter-spacing: 4px; animation: blink 1s ease-in-out infinite;
}
.loader-status { font-family: 'Rajdhani', sans-serif; font-size: 0.95rem; color: rgba(255,255,255,0.55); letter-spacing: 2px; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.35} }

.error-banner {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: rgba(150,25,25,0.96); color: #fff;
    font-family: 'Rajdhani', sans-serif; font-size: 14px;
    padding: 10px 24px; border-radius: 8px; z-index: 10000;
    display: none; max-width: 92%; text-align: center;
    border: 1px solid rgba(255,80,80,0.5);
}
.error-banner.show { display: block; }
</style>
</head>
<body>

<div class="snow-container" id="snow"></div>

<div class="browser-ui">
    <div class="tabs" id="tabs">
        <button class="newtab-btn" id="newtab" title="New Tab"><i class="fas fa-plus"></i></button>
    </div>
    <div class="navbar">
        <button class="nav-btn" id="back"    title="Back"><i class="fas fa-arrow-left"></i></button>
        <button class="nav-btn" id="forward" title="Forward"><i class="fas fa-arrow-right"></i></button>
        <button class="nav-btn" id="reload"  title="Reload"><i class="fas fa-rotate-right"></i></button>
        <div class="urlbar">
            <select class="engine-select" id="engineSelect">
                <option value="google">Google</option>
                <option value="duckduckgo">DuckDuckGo</option>
                <option value="brave">Brave</option>
                <option value="bing">Bing</option>
                <option value="yahoo">Yahoo</option>
                <option value="ecosia">Ecosia</option>
                <option value="startpage">Startpage</option>
            </select>
            <input class="url-input" id="urlInput" placeholder="Search or enter address" autocomplete="off" spellcheck="false">
        </div>
        <button class="nav-btn" id="popout" title="Open in new tab"><i class="fas fa-external-link-alt"></i></button>
    </div>
</div>

<div class="loader" id="loader">
    <img src="https://media1.tenor.com/m/fitGu2TwtHoAAAAd/cat-hyppy.gif" alt="Loading">
    <div class="loader-text">LOADING...</div>
    <div class="loader-status" id="loaderStatus">Initializing...</div>
</div>

<div class="error-banner" id="errorBanner"></div>

<script>
// ── Your UV files are all in the ROOT of your repo ──
// sw file is uv.sw.js, baremux worker is worker.js at root
const HOME_URL   = "https://classroomspot.github.io/movies.html";
const SW_PATH    = "/uv.sw.js";       // your sw file is uv.sw.js at root
const SW_SCOPE   = "/uv/service/";    // must match prefix in uv.config.js
const WISP_URL   = "wss://wisp.rhw.one/";

const ENGINES = {
    google:     "https://www.google.com/search?q=",
    duckduckgo: "https://duckduckgo.com/?q=",
    brave:      "https://search.brave.com/search?q=",
    bing:       "https://www.bing.com/search?q=",
    yahoo:      "https://search.yahoo.com/search?p=",
    ecosia:     "https://www.ecosia.org/search?q=",
    startpage:  "https://www.startpage.com/sp/search?query="
};

let tabs = [], activeId = null, idCounter = 0;

const tabsEl    = document.getElementById("tabs");
const newtabBtn = document.getElementById("newtab");
const urlInput  = document.getElementById("urlInput");
const engineSel = document.getElementById("engineSelect");
const loaderEl  = document.getElementById("loader");
const statusEl  = document.getElementById("loaderStatus");
const errorEl   = document.getElementById("errorBanner");

const setStatus  = msg => statusEl.textContent = msg;
const showLoader = ()  => loaderEl.classList.remove("hidden");
const hideLoader = ()  => loaderEl.classList.add("hidden");

function showError(msg) {
    console.error(msg);
    errorEl.textContent = msg;
    errorEl.classList.add("show");
    setTimeout(() => errorEl.classList.remove("show"), 8000);
}

function waitForUV(ms = 8000) {
    return new Promise((resolve, reject) => {
        const start = Date.now();
        const check = () => {
            if (typeof self.__uv$config !== "undefined" &&
                typeof self.__uv$config.encodeUrl === "function") {
                resolve();
            } else if (Date.now() - start > ms) {
                reject(new Error("uv.config.js loaded but __uv$config never defined. Check uv.config.js syntax."));
            } else {
                setTimeout(check, 50);
            }
        };
        check();
    });
}

function waitForSW(ms = 4000) {
    return new Promise(resolve => {
        if (!navigator.serviceWorker) { resolve(); return; }
        if (navigator.serviceWorker.controller) { resolve(); return; }
        const cb = () => {
            navigator.serviceWorker.removeEventListener("controllerchange", cb);
            resolve();
        };
        navigator.serviceWorker.addEventListener("controllerchange", cb);
        setTimeout(resolve, ms);
    });
}

function normalize(raw) {
    const v = raw.trim();
    if (!v) return null;
    if (/^https?:\/\//i.test(v)) return v;
    if (/^[\w-]+(\.[a-z]{2,})+(\/.*)?$/i.test(v) && !v.includes(" "))
        return "https://" + v;
    return ENGINES[engineSel.value] + encodeURIComponent(v);
}

function uvEncode(url) {
    try {
        return self.__uv$config.prefix + self.__uv$config.encodeUrl(url);
    } catch(e) {
        showError("UV encode failed: " + e.message);
        return null;
    }
}

function getTab(id) {
    return tabs.find(t => t.id === (id !== undefined ? id : activeId));
}

function updateNavBtns() {
    const t = getTab();
    document.getElementById("back").disabled    = !t || t.index <= 0;
    document.getElementById("forward").disabled = !t || t.index >= t.history.length - 1;
}

function navigate(raw, push) {
    if (push === undefined) push = true;
    const tab = getTab();
    if (!tab) return;
    const url = normalize(raw);
    if (!url) return;

    if (push) {
        tab.history = tab.history.slice(0, tab.index + 1);
        tab.history.push(url);
        tab.index++;
    }

    urlInput.value = url;
    tab.iframe.classList.add("active");

    const proxied = uvEncode(url);
    if (!proxied) return;

    showLoader();
    setStatus("Loading page...");
    tab.iframe.src = proxied;

    const done = () => {
        hideLoader();
        let title = "";
        try { title = tab.iframe.contentDocument?.title || ""; } catch(e) {}
        if (!title) { try { title = new URL(url).hostname; } catch(e) { title = url; } }
        tab.tabEl.querySelector("span").textContent = title || "Tab";
        updateNavBtns();
    };
    tab.iframe.onload = done;
    const fallback = setTimeout(done, 15000);
    tab.iframe.addEventListener("load", () => clearTimeout(fallback), { once: true });
}

function createTab(url) {
    const id = idCounter++;
    const iframe = document.createElement("iframe");
    iframe.className = "viewframe";
    iframe.setAttribute("sandbox",
        "allow-scripts allow-same-origin allow-forms allow-modals allow-popups allow-pointer-lock allow-presentation"
    );
    document.body.appendChild(iframe);

    const tabEl = document.createElement("div");
    tabEl.className = "tab";
    tabEl.innerHTML = `<span>New Tab</span><i class="fas fa-xmark close-btn"></i>`;
    tabEl.addEventListener("click", e => {
        if (e.target.closest(".close-btn")) closeTab(id);
        else activateTab(id);
    });
    tabsEl.insertBefore(tabEl, newtabBtn);
    tabs.push({ id, iframe, tabEl, history: [], index: -1 });
    activateTab(id);
    navigate(url || HOME_URL);
}

function activateTab(id) {
    activeId = id;
    tabs.forEach(t => {
        t.iframe.classList.toggle("active", t.id === id);
        t.tabEl.classList.toggle("active", t.id === id);
    });
    const tab = getTab();
    if (!tab) return;
    urlInput.value = tab.index >= 0 ? tab.history[tab.index] : "";
    updateNavBtns();
}

function closeTab(id) {
    if (tabs.length === 1) return;
    const i = tabs.findIndex(t => t.id === id);
    tabs[i].iframe.remove();
    tabs[i].tabEl.remove();
    tabs.splice(i, 1);
    activateTab(tabs[Math.max(0, i - 1)].id);
}

document.getElementById("back").onclick = () => {
    const t = getTab(); if (!t || t.index <= 0) return;
    t.index--; navigate(t.history[t.index], false);
};
document.getElementById("forward").onclick = () => {
    const t = getTab(); if (!t || t.index >= t.history.length - 1) return;
    t.index++; navigate(t.history[t.index], false);
};
document.getElementById("reload").onclick = () => {
    const t = getTab(); if (t && t.history[t.index]) navigate(t.history[t.index], false);
};
document.getElementById("popout").onclick = () => {
    const t = getTab(); if (t && t.iframe.src) window.open(t.iframe.src, "_blank");
};
urlInput.addEventListener("keydown", e => {
    if (e.key === "Enter" && urlInput.value.trim()) { e.preventDefault(); navigate(urlInput.value); }
});
newtabBtn.onclick = () => createTab();

// Snow
(function(){
    const c = document.getElementById("snow");
    for (let i = 0; i < 80; i++) {
        const p = document.createElement("div");
        p.className = "particle";
        const sz = Math.random() * 4 + 2;
        p.style.cssText = `left:${Math.random()*100}%;width:${sz}px;height:${sz}px;`
            + `animation-duration:${Math.random()*5+3}s;animation-delay:${Math.random()*6}s;`
            + `opacity:${Math.random()*0.45+0.15};`;
        c.appendChild(p);
    }
})();

// ── BOOT ─────────────────────────────────────────────────────
(async () => {
    try {
        // Wait for the inline scripts (uv.bundle.js, uv.config.js) to define __uv$config
        setStatus("Waiting for UV config...");
        await waitForUV();

        // Register service worker — your sw file is uv.sw.js at root
        if (navigator.serviceWorker) {
            setStatus("Registering service worker...");
            try {
                const reg = await navigator.serviceWorker.register(SW_PATH, { scope: SW_SCOPE });
                if (reg.installing || reg.waiting) {
                    setStatus("Activating service worker...");
                    await waitForSW();
                }
            } catch(swErr) {
                // SW scope error — GitHub Pages may block scope outside sw location
                // Try registering without explicit scope
                console.warn("SW register with scope failed, trying without scope:", swErr.message);
                try {
                    await navigator.serviceWorker.register(SW_PATH);
                    await waitForSW();
                } catch(swErr2) {
                    console.warn("SW registration failed entirely:", swErr2.message);
                    showError("Service worker failed: " + swErr2.message);
                }
            }
        }

        // Init BareMux — your worker is at /worker.js (root)
        setStatus("Starting transport...");
        if (typeof BareMux !== "undefined") {
            const conn = new BareMux.BareMuxConnection("/worker.js");
            await conn.setTransport("/index.mjs", [{ websocket: WISP_URL }]);
        } else {
            console.warn("BareMux not defined — worker.js may not have loaded");
        }

        setStatus("Ready!");
        createTab();

    } catch(err) {
        setStatus("Error: " + err.message);
        showError(err.message);
        console.error("Boot error:", err);
        createTab(); // still open tab so UI isn't stuck
    }
})();
</script>
</body>
</html>
