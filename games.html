<style>
*{box-sizing:border-box}
body{margin:0;font-family:'Segoe UI',sans-serif;background:#000;color:white;overflow-x:hidden}
canvas#particles{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
.nav{padding:16px 24px;background:rgba(0,0,0,.9);backdrop-filter:blur(10px);display:flex;align-items:center;gap:12px;position:relative;z-index:10;border-bottom:1px solid rgba(255,255,255,.15)}
.logo{font-size:22px;font-weight:800;color:#fff;text-shadow:0 0 12px #fff,0 0 24px rgba(255,255,255,.6);letter-spacing:-.5px}
.topbar{padding:12px 24px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(255,255,255,.1);position:relative;z-index:10;background:rgba(0,0,0,.8)}
#total{font-size:13px;color:#fff;font-weight:600;letter-spacing:.5px;text-shadow:0 0 8px rgba(255,255,255,.5)}
#search{padding:8px 16px;border-radius:20px;border:1px solid rgba(255,255,255,.25);background:rgba(10,10,10,.9);color:white;width:240px;font-size:13px;outline:none;transition:border .2s,box-shadow .2s}
#search:focus{border-color:#fff;box-shadow:0 0 12px rgba(255,255,255,.3)}
#search::placeholder{color:#555}
.games-grid{display:grid;grid-template-columns:repeat(9,1fr);gap:12px;padding:20px 24px;position:relative;z-index:10}
.game-card{aspect-ratio:1;border-radius:8px;background-size:cover;background-position:center;background-color:#080808;display:flex;align-items:flex-end;justify-content:center;cursor:pointer;transition:transform .15s ease,box-shadow .15s ease,border-color .15s;border:1px solid rgba(255,255,255,.1);position:relative;overflow:hidden}
.game-card:hover{transform:scale(1.06);box-shadow:0 0 20px rgba(255,255,255,.35),0 0 40px rgba(255,255,255,.12);border-color:rgba(255,255,255,.5);z-index:5}
.game-card::before{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,transparent 40%,rgba(0,0,0,.88) 100%);border-radius:8px}
.game-name{position:relative;width:100%;text-align:center;font-size:10px;font-weight:600;padding:4px 4px 6px;line-height:1.3;color:#fff;text-shadow:0 0 6px rgba(255,255,255,.8),0 1px 3px rgba(0,0,0,.9);z-index:2}
.preview-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#000;z-index:10000;flex-direction:column}
.preview-overlay.active{display:flex}
.preview-header{background:rgba(0,0,0,.97);padding:12px 20px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(255,255,255,.15);height:48px;box-sizing:border-box}
.preview-title{font-size:16px;font-weight:700;color:#fff;text-shadow:0 0 10px rgba(255,255,255,.7)}
.preview-close{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.25);border-radius:50%;width:32px;height:32px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s}
.preview-close:hover{background:rgba(255,255,255,.25)}
.preview-content{flex:1;position:relative;width:100%;overflow:hidden}
.preview-frame{width:100%;height:100%;border:none;background:#000}
</style>

let W,H,particles=[];
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=document.body.scrollHeight;}
function initParticles(){particles=[];const count=Math.floor((W*H)/12000);for(let i=0;i<count;i++)particles.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*2+.5,vx:(Math.random()-.5)*.4,vy:(Math.random()-.5)*.4,alpha:Math.random()*.6+.1});}
function animateParticles(){ctx.clearRect(0,0,W,H);particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle='#ffffff';ctx.globalAlpha=p.alpha;ctx.fill();ctx.globalAlpha=1;});ctx.globalAlpha=.06;ctx.strokeStyle='#ffffff';ctx.lineWidth=.5;for(let i=0;i<particles.length;i++)for(let j=i+1;j<particles.length;j++){const dx=particles[i].x-particles[j].x,dy=particles[i].y-particles[j].y,dist=Math.sqrt(dx*dx+dy*dy);if(dist<100){ctx.globalAlpha=.06*(1-dist/100);ctx.beginPath();ctx.moveTo(particles[i].x,particles[i].y);ctx.lineTo(particles[j].x,particles[j].y);ctx.stroke();}}ctx.globalAlpha=1;requestAnimationFrame(animateParticles);}
resize();initParticles();animateParticles();

function makeCard(title,imageUrl,onClickFn){const card=document.createElement("div");card.className="game-card";if(imageUrl)card.style.backgroundImage="url("+imageUrl+")";const label=document.createElement("div");label.className="game-name";label.textContent=title;card.appendChild(label);card.onclick=onClickFn;return card;}
function openNoahGame(g){const win=window.open("about:blank","_blank");if(!win){window.open(g.url,'_blank');return;}fetch(g.url).then(r=>{if(!r.ok)throw new Error("HTTP "+r.status);return r.text();}).then(t=>{win.document.open();win.document.write(t);win.document.close();}).catch(()=>{win.document.open();win.document.write('<!DOCTYPE html><html><head><style>*{margin:0;padding:0}body,html{width:100%;height:100%;overflow:hidden}iframe{border:none;width:100vw;height:100vh}</style></head><body><iframe src="'+g.url+'" allowfullscreen allow="autoplay"></iframe></body></html>');win.document.close();});}
function openCsGame(g){const win=window.open("about:blank","_blank");if(!win)return;fetch(g.url.replace("{HTML_URL}",HTML)).then(r=>r.text()).then(t=>{win.document.open();win.document.write(t);win.document.close();}).catch(()=>win.document.write("<h1 style='color:white;background:#000;padding:20px'>Error loading game</h1>"));}
let allCsGames=[];
let searchQuery='';
function doRender(){gamesEl.innerHTML="";const q=searchQuery.toLowerCase();const seen=new Set();
const filteredCustom=q?CUSTOM_GAMES.filter(g=>g.title.toLowerCase().includes(q)):CUSTOM_GAMES;
filteredCustom.forEach(g=>{const key=g.title.toLowerCase().trim();if(seen.has(key))return;seen.add(key);const card=makeCard(g.title,g.image,()=>{if(g.b64)openPreview(atob(g.b64),g.title);else if(g.url)openPreviewUrl(g.url,g.title);});gamesEl.appendChild(card);});
const filteredCs=q?allCsGames.filter(g=>g.name.toLowerCase().includes(q)):allCsGames;
filteredCs.forEach(g=>{const key=g.name.toLowerCase().trim();if(seen.has(key))return;seen.add(key);const coverUrl=g.cover?g.cover.replace("{COVER_URL}",COVER).replace("{HTML_URL}",HTML):'';gamesEl.appendChild(makeCard(g.name,coverUrl,()=>openCsGame(g)));});
const filteredNoah=q?NOAH_GAMES.filter(g=>g.title.toLowerCase().includes(q)):NOAH_GAMES;
filteredNoah.forEach(g=>{if(!g.url||g.url==='h')return;const key=g.title.toLowerCase().trim();if(seen.has(key))return;seen.add(key);gamesEl.appendChild(makeCard(g.title,g.image,()=>openNoahGame(g)));});
setTimeout(resizeCanvas,100);
totalEl.textContent="Total games: "+document.querySelectorAll('.game-card').length;}
searchEl.oninput=()=>{searchQuery=searchEl.value;doRender();};
fetch(ZONES+"?t="+Date.now()).then(r=>{if(!r.ok)throw new Error("HTTP "+r.status);return r.json();}).then(data=>{allCsGames=data.filter(g=>!g.name.toLowerCase().includes("suggest")&&!g.name.includes("[!]"));doRender();}).catch(err=>{console.error("Error loading CS games:",err);doRender();});
</script>
